<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Homework Save App</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #e0f7fa, #f1f8e9);
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #000000;
      margin-bottom: 5px;
    }
    h2 {
      text-align: center;
      color: #004d40;
      margin-top: 0;
      font-size: 1.2em;
      font-weight: normal;
    }
    #homeworkForm {
      background-color: #ffffff;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }
    input, textarea {
      margin-top: 10px;
      padding: 10px;
      font-size: 1em;
      border: 1px solid #b2dfdb;
      border-radius: 5px;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      margin-top: 15px;
      padding: 10px;
      background-color: #00ffe1;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
      width: 100%;
    }
    button:hover {
      background-color: #004d40;
    }
    #homeworkList {
      margin-top: 30px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .homeworkItem {
      background-color: #f9fbe7;
      border-left: 5px solid #8bc34a;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      position: relative;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .homeworkItem strong {
      color: #33691e;
    }
    .deleteBtn {
      background-color: #e53935;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      position: absolute;
      top: 15px;
      right: 15px;
    }
    .deleteBtn:hover {
      background-color: #b71c1c;
    }
    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.9em;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>🎓 Homework Save App</h1>
  <h2>VSS English School</h2>
  
  <div id="homeworkForm">
    <input type="text" id="subject" placeholder="Subject" required>
    <input type="date" id="dueDate" required>
    <input type="time" id="dueTime" required>
    <textarea id="details" placeholder="Homework details..." rows="4" required></textarea>
    <button onclick="saveHomework()">Save Homework</button>
  </div>

  <div id="homeworkList"></div>

  <footer>
    Made By 9th Class Student [Sahil Pathan]
  </footer>

  <script>
    function loadHomework() {
      const homeworkList = document.getElementById('homeworkList');
      homeworkList.innerHTML = '';
      const homeworkData = JSON.parse(localStorage.getItem('homework')) || [];
      homeworkData.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'homeworkItem';
        div.innerHTML = `
          <strong>${item.subject}</strong><br>
          <p>${item.details}</p>
          <p><em>Due: ${item.dueDate} at ${item.dueTime}</em></p>
          <button class="deleteBtn" onclick="deleteHomework(${index})">Delete</button>
        `;
        homeworkList.appendChild(div);
      });
    }

    function saveHomework() {
      const subject = document.getElementById('subject').value.trim();
      const details = document.getElementById('details').value.trim();
      const dueDate = document.getElementById('dueDate').value;
      const dueTime = document.getElementById('dueTime').value;

      if (subject && details && dueDate && dueTime) {
        const homeworkData = JSON.parse(localStorage.getItem('homework')) || [];
        homeworkData.push({ subject, details, dueDate, dueTime });
        localStorage.setItem('homework', JSON.stringify(homeworkData));

        // Clear form
        document.getElementById('subject').value = '';
        document.getElementById('details').value = '';
        document.getElementById('dueDate').value = '';
        document.getElementById('dueTime').value = '';

        loadHomework();
      } else {
        alert("Please fill in all fields.");
      }
    }

    function deleteHomework(index) {
      const homeworkData = JSON.parse(localStorage.getItem('homework')) || [];
      homeworkData.splice(index, 1);
      localStorage.setItem('homework', JSON.stringify(homeworkData));
      loadHomework();
    }

    window.onload = loadHomework;
  </script>

</body>
</html>
